{% extends 'home/paginas/index.html'%}
{%load static%}

{% block content %}
<main class="main-content">
    <div id="history-section" class="form-section">
        <div class="history-card">
            <div class="history-header">
                <h2 class="form-title">Histórico de Empréstimos</h2>
                <div class="history-filters">
                    <div class="filter-group">
                        <select class="filter-select">
                            <option>Filtrar por status</option>
                            <option>Ativos</option>
                            <option>Concluídos</option>
                            <option>Atrasados</option>
                        </select>
                        <i class="fas fa-chevron-down select-icon"></i>
                    </div>
                    <div class="filter-group">
                        <input type="text" placeholder="Buscar livro..." class="filter-input">
                        <i class="fas fa-search filter-icon"></i>
                    </div>
                </div>
            </div>
            <div class="table-container">
                <table class="history-table">
                    <thead class="table-header">
                        <tr>
                            <th scope="col" class="table-heading">Livro</th>
                            <!-- <th scope="col" class="table-heading">Usuário</th> -->
                            <th scope="col" class="table-heading">Data</th>
                            <th scope="col" class="table-heading">Paginas</th>
                        </tr>
                    </thead>
                    <tbody class="table-body">
                        <!-- History Item 1 -->
                        <tr class="history-item">
                            {%for livro in livros%}
                            <td class="table-cell">
                                <div class="book-info">
                                    <div class="book-icon">
                                        <i class="fas fa-book"></i>
                                    </div>
                                    <div class="book-details-cell">
                                        <div class="book-name">{{livro.nome_livro}}</div>
                                        <div class="book-author-cell">{{livro.autor}}</div>
                                    </div>
                                </div>
                            </td>
                            <td class="table-cell">
                                {{livro.data}}
                            </td>
                            <td class="table-cell">
                                <span class="status-tag returned">
                                    {{livro.paginas}}
                                </span>
                            </td>
                            <!-- Actions -->
                            <td class="table-cell actions-cell">
                                <button class="action-btn"><i class="fas fa-eye"></i></button>
                                <button class="action-btn"><i class="fas fa-print"></i></button>
                            </td>
                        </tr>
                        {%endfor%}
                    </tbody>
                </table>
            </div>
        </div>
</main>
{% endblock %}
